<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../imagensicones/heringerstorelogo-removebg-preview.png">
    <title>Camisas Disponíveis</title>
    <link rel="stylesheet" href="../pastacss/camisas.css">
</head>

<body>

    <!-- ===== HEADER ===== -->
    <header>
        <a href="paginaentrada.html" style="text-decoration: none">
            <div class="logo">HERINGER STORE</div>
        </a>
        <div class="nav-right">
            <div class="search-box">
                <input type="text" placeholder="Pesquisar Produto">
            </div>
            <ul class="nav-links">
                <li><a href="paginaentrada.html">Início</a></li>
                <li><a href="camisas.html">Camisas</a></li>
                <li><a href="sobre.html">Sobre</a></li>
            </ul>
            <div class="cart-icon" id="cartIcon">
                🛒
                <span class="cart-count" id="cartCount">0</span>
            </div>
            <div class="btn-login" id="auth-container">
                <button id="profileBtn" style="background: transparent; cursor: pointer; border:none;">
                    👤
                </button>
            </div>
        </div>
    </header>

    <!-- ===== SEÇÃO DE CAMISAS ===== -->
    <main class="main-content">
        <section class="products-container">
            <h2 class="section-title">Todas as Camisas</h2>
            <div id="productsGrid" class="products-grid"></div>
        </section>
    </main>

    <!-- ===== MODAL DO CARRINHO ===== -->
    <div class="modal" id="cartModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Carrinho</h2>
                <button class="close-modal" id="closeModal">&times;</button>
            </div>
            <div id="cartItems"></div>
            <div id="cartSummary"></div>
        </div>
    </div>


    <div id="loginModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Minha Conta</h2>
                <button class="close-modal" id="closeLogin">&times;</button>
            </div>

            <div class="login-container">
                <div class="auth-tabs">
                    <button class="auth-tab active" onclick="switchTab('login')">Login</button>
                    <button class="auth-tab" onclick="switchTab('signup')">Cadastro</button>
                </div>

                <form id="loginForm" class="auth-form">
                    <input type="email" placeholder="E-mail" required>
                    <input type="password" placeholder="Senha" required>
                    <button type="submit" class="checkout-btn">Entrar</button>
                    <p style="text-align: center; margin-top: 10px; font-size: 0.8rem; cursor: pointer;">Esqueceu a
                        senha?</p>
                </form>

                <form id="signupForm" class="auth-form" style="display: none;">
                    <input type="text" placeholder="Nome Completo" required>
                    <input type="email" placeholder="E-mail" required>
                    <input type="password" placeholder="Criar Senha" required>
                    <button type="submit" class="checkout-btn">Criar Conta</button>
                </form>
            </div>
        </div>
    </div>

    <script src="../passajs/camisas.js"></script>
</body>

</html>
